version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME}
      - POSTGRESQL_URL=${POSTGRESQL_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend/models:/app/models